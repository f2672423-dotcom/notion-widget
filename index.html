<html>
<head>

}

.container{

}

.label{

.line{

    background:#75c1c4;
    margin-left:12px;
}
</style>
</head>

<body>

<div class="container">
    <div class="label">
        Cotton Candy
    </div>

    <div class="line"></div>
</div>

</html>
